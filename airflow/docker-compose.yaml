services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    image: apache/airflow:2.9.1
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon boto3 python-dotenv requests
    volumes:
      - ./dags:/opt/airflow/dags
      - ../extraction:/opt/airflow/extraction
      - ../data:/opt/airflow/data
      - ../.env:/opt/airflow/.env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.1
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon boto3 python-dotenv requests
    volumes:
      - ./dags:/opt/airflow/dags
      - ../extraction:/opt/airflow/extraction
      - ../data:/opt/airflow/data
      - ../.env:/opt/airflow/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: webserver
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.9.1
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon boto3 python-dotenv requests
    volumes:
      - ./dags:/opt/airflow/dags
      - ../extraction:/opt/airflow/extraction
      - ../data:/opt/airflow/data
      - ../.env:/opt/airflow/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: scheduler
    restart: always